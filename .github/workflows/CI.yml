
#goal - i have to build test the code for backend, frontend, then push the image to docker hub
name: CI

on:
  push:
    branches: [master]
   
jobs:
    build and push:
      runs-on: ubuntu-latest
      steps:
         - name: Checkout code
           uses: action/checkout@v7
           
         - name: login to docker hub
           uses: docker/login-action@v4
           with:
              username: ${{ vars.DOCKER_USERNAME }}
              password: ${{ secrets.DOCKERHUB_TOKEN }}
  
